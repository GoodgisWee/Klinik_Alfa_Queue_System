<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Doctor Panel - Klinik Alfa</title>
<link rel="stylesheet" href="/css/doctor.css" />
</head>
<body>

<header class="topbar">
  <h1>Doctor Panel</h1>
  <button id="logout-btn" class="hidden">Logout</button>
</header>

<main>
  <!-- Login screen -->
  <section id="login-screen" class="card">
    <h2>Sign in</h2>
    <label>Username</label>
    <input type="text" id="username" autocomplete="username" />

    <label>Password</label>
    <input type="password" id="password" autocomplete="current-password" />

    <label>Consultation Room</label>
    <select id="room-select"></select>

    <p id="login-error" class="error hidden"></p>

    <button id="login-btn">Login</button>
  </section>

  <!-- Doctor panel -->
  <section id="panel-screen" class="card hidden">
    <p class="label">Consultation Room</p>
    <h2 id="room-name">-</h2>

    <p class="label">Current Queue Number</p>
    <h2 id="current-number">&mdash;</h2>

    <label>Enter Queue Number</label>
    <input type="text" id="queue-input" placeholder="e.g. 001" inputmode="numeric" />

    <button id="call-btn">&#128226; Call</button>
    <button id="recall-btn" class="recall">&#10227; Recall</button>
  </section>
</main>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/doctor.js"></script>
</body>
</html>
